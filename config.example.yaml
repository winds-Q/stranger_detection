camera:
  device_id: 0
  width: 640
  height: 480

recognition:
  tolerance: 0.5
  model: "hog"
  stranger_tolerance: 0.5
  stranger_retention_seconds: 3600

processing:
  detect_every_n_frames: 3
  max_detection_fps: 4
  detection_scale: 0.5

detection_confirmation:
  window_seconds: 3
  required_hits: 4
  minimum_duration_seconds: 1

alert:
  enabled: true
  cooldown_seconds: 180
  smtp_server: "smtp.qq.com"
  smtp_port: 587
  sender_email: "your_email@qq.com"
  sender_password: ""
  receiver_email: "receiver@example.com"

snapshot:
  save_to: "./snapshots/"
  max_snapshots: 100
